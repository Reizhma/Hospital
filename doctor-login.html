<!DOCTYPE html>
<html>
<head>
  <title>Doctor Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('medicine.jpg') no-repeat center center/cover;
    }
    .login-box {
      background: rgba(255, 255, 255, 0.9);
      padding: 40px;
      border-radius: 10px;
      text-align: center;
      width: 300px;
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      background: #4CAF50;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Doctor Login</h2>
   <form action="doc.html" method="post">
  <input type="email" placeholder="Email" required><br>
  <input type="password" placeholder="Password" required><br>
  <button type="submit">Login</button>
</form>

    <br>
    <p>Don't have an account? <a href="doctor-register.html">Register here</a></p>
  </div>
</body>
</html>
